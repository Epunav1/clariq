version: '3.8'

services:
  # FastAPI Backend
  backend:
    build: .
    container_name: clariq-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DATABASE_URL=sqlite:///./data/clariq.db
      - SNOWFLAKE_ACCOUNT=${SNOWFLAKE_ACCOUNT}
      - SNOWFLAKE_USER=${SNOWFLAKE_USER}
      - SNOWFLAKE_PASSWORD=${SNOWFLAKE_PASSWORD}
      - SNOWFLAKE_WAREHOUSE=${SNOWFLAKE_WAREHOUSE}
      - SNOWFLAKE_DATABASE=${SNOWFLAKE_DATABASE}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - JWT_SECRET=${JWT_SECRET}
      - SHOPIFY_API_KEY=${SHOPIFY_API_KEY}
      - SHOPIFY_API_PASSWORD=${SHOPIFY_API_PASSWORD}
    volumes:
      - ./backend:/app
      - ./data:/app/data
    networks:
      - clariq-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:latest
    container_name: clariq-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./clariq-dashboard.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - backend
    networks:
      - clariq-network
    restart: unless-stopped

  # PostgreSQL (optional, for production data)
  postgres:
    image: postgres:15-alpine
    container_name: clariq-postgres
    environment:
      - POSTGRES_DB=clariq
      - POSTGRES_USER=${DB_USER:-clariq}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clariq-network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:

networks:
  clariq-network:
    driver: bridge
